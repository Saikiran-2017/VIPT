version: '3.9'

services:
  # ─── PostgreSQL Database ─────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: vipt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vipt_price_tracker
      POSTGRES_USER: vipt_admin
      POSTGRES_PASSWORD: vipt_secure_password_2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vipt_admin -d vipt_price_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vipt-network

  # ─── Redis Cache ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vipt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vipt-network

  # ─── Backend API Server ──────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vipt-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vipt_price_tracker
      DB_USER: vipt_admin
      DB_PASSWORD: vipt_secure_password_2026
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vipt-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vipt-network:
    driver: bridge
